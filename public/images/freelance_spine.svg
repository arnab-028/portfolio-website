<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 338" width="100%" height="100%">
  <rect width="600" height="338" fill="#020617"/>
  <!-- Leaf Spine topology -->
  <!-- Spines -->
  <rect x="180" y="50" width="80" height="30" rx="3" fill="#1e293b" stroke="#a855f7" stroke-width="2"/>
  <text x="220" y="69" font-family="sans-serif" font-size="10" fill="#ffffff" text-anchor="middle">Spine 01</text>
  
  <rect x="340" y="50" width="80" height="30" rx="3" fill="#1e293b" stroke="#a855f7" stroke-width="2"/>
  <text x="380" y="69" font-family="sans-serif" font-size="10" fill="#ffffff" text-anchor="middle">Spine 02</text>
  
  <!-- Leafs -->
  <rect x="100" y="160" width="80" height="30" rx="3" fill="#1e293b" stroke="#84cc16" stroke-width="2"/>
  <text x="140" y="179" font-family="sans-serif" font-size="10" fill="#ffffff" text-anchor="middle">Leaf 01</text>
  
  <rect x="260" y="160" width="80" height="30" rx="3" fill="#1e293b" stroke="#84cc16" stroke-width="2"/>
  <text x="300" y="179" font-family="sans-serif" font-size="10" fill="#ffffff" text-anchor="middle">Leaf 02</text>
  
  <rect x="420" y="160" width="80" height="30" rx="3" fill="#1e293b" stroke="#84cc16" stroke-width="2"/>
  <text x="460" y="179" font-family="sans-serif" font-size="10" fill="#ffffff" text-anchor="middle">Leaf 03</text>
  
  <!-- Links -->
  <line x1="220" y1="80" x2="140" y2="160" stroke="#475569" stroke-width="1.5"/>
  <line x1="220" y1="80" x2="300" y2="160" stroke="#475569" stroke-width="1.5"/>
  <line x1="220" y1="80" x2="460" y2="160" stroke="#475569" stroke-width="1.5"/>
  
  <line x1="380" y1="80" x2="140" y2="160" stroke="#475569" stroke-width="1.5"/>
  <line x1="380" y1="80" x2="300" y2="160" stroke="#475569" stroke-width="1.5"/>
  <line x1="380" y1="80" x2="460" y2="160" stroke="#475569" stroke-width="1.5"/>

  <text x="300" y="270" font-family="sans-serif" font-size="16" font-weight="bold" fill="#a855f7" text-anchor="middle">Nexus Leaf-Spine LAN Refresh</text>
  <text x="300" y="292" font-family="sans-serif" font-size="12" fill="#64748b" text-anchor="middle">High throughput vPC active-active fabrics</text>
</svg>