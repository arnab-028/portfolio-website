  <text x="420" y="143" font-family="sans-serif" font-size="9" font-weight="bold" fill="#34d399" text-anchor="middle">PAYOUT</text>
  
  <text x="300" y="280" font-family="sans-serif" font-size="18" font-weight="bold" fill="#ffffff" text-anchor="middle">enmmey.com</text>
  <text x="300" y="304" font-family="sans-serif" font-size="11" fill="#f43f5e" text-anchor="middle" font-weight="semibold">Influencer Management Platform &bull; Iveora</text>
</svg>