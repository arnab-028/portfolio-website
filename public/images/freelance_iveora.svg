<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 338" width="100%" height="100%">
  <rect width="600" height="338" fill="#020617"/>
  
  <!-- Abstract influencer/campaign bubble graph -->
  <circle cx="180" cy="130" r="30" fill="#ec4899" fill-opacity="0.15" stroke="#ec4899" stroke-width="2"/>
  <circle cx="300" cy="110" r="45" fill="#f43f5e" fill-opacity="0.15" stroke="#f43f5e" stroke-width="2.5"/>
  <circle cx="420" cy="140" r="25" fill="#10b981" fill-opacity="0.15" stroke="#10b981" stroke-width="1.5"/>
  
  <!-- Node connectors -->
  <line x1="210" y1="125" x2="255" y2="115" stroke="#374151" stroke-width="1.5"/>
  <line x1="345" y1="118" x2="395" y2="132" stroke="#374151" stroke-width="1.5"/>
  
  <!-- Tech labels inside bubbles -->
  <text x="180" y="134" font-family="sans-serif" font-size="10" font-weight="bold" fill="#f472b6" text-anchor="middle">CREATOR</text>
