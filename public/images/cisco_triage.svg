  <text x="60" y="216" font-family="monospace" font-size="10" fill="#cbd5e1">0020  00 05 02 01 00 2c 0a 01 0c 01 00 00 00 00 c0 a8  .....,..........</text>
  
  <text x="300" y="310" font-family="sans-serif" font-size="14" font-weight="bold" fill="#38bdf8" text-anchor="middle">L2/L3 Packet Diagnostics (ASR &amp; NCS)</text>
